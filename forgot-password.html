<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SkillSync</title>
    <script type="module" src="./env.js"></script>
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <a href="index.html" class="logo">
        <img src="logo.png" alt="SkillSync Logo">
    </a>
    <div class="container" style="justify-content: center;">
        <div class="form-box" style="max-width: 500px;">
            <h2>Reset Password</h2>
            <p style="margin-bottom: 20px; color: #666; font-size: 0.9rem;">Enter your email address and we'll send you a link to reset your password.</p>
            <div id="resetMessage" style="display: none; margin-bottom: 15px; padding: 10px; border-radius: 5px; font-size: 0.9rem;"></div>
            <div class="input-group">
                <img src="https://cdn0.iconfinder.com/data/icons/essentials-4/1691/packet-64.png" alt="Email Icon">
                <input type="email" id="reset-email" placeholder="Enter your email" required>
            </div>
            <button id="submitReset">Send Reset Link</button>
            <a href="login.html" class="forgot-password">Back to Login</a>
        </div>
    </div>

    <script type="module">
        import { auth } from './env.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";

        const resetBtn = document.getElementById('submitReset');
        const messageDiv = document.getElementById('resetMessage');

        function showStatus(message, isError = false) {
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            messageDiv.style.backgroundColor = isError ? '#ffe3e3' : '#e3ffe3';
            messageDiv.style.color = isError ? '#d32f2f' : '#2e7d32';
        }

        resetBtn.addEventListener('click', () => {
            const email = document.getElementById('reset-email').value;
            if (!email) {
                showStatus('Please enter your email address.', true);
                return;
            }

            sendPasswordResetEmail(auth, email)
                .then(() => {
                    showStatus('Reset link sent! Please check your inbox.');
                })
                .catch((error) => {
                    console.error(error);
                    if (error.code === 'auth/user-not-found') {
                        showStatus('No user found with this email.', true);
                    } else {
                        showStatus('Failed to send reset link. Try again.', true);
                    }
                });
        });
    </script>
</body>
</html>
